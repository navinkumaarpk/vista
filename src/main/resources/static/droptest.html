<!DOCTYPE html>
<html>
<head>
  <title>VISTA Test Data Drop Box</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; color: #1a1a1a; }
    h1 { color: #1F4E79; }
    textarea { width: 100%; height: 180px; font-family: monospace; font-size: 13px; }
    button { background: #1F4E79; color: #fff; border: 0; padding: 10px 18px; cursor: pointer; border-radius: 4px; }
    .row { display: flex; gap: 24px; }
    .col { flex: 1; }
    pre { background: #f2f7fd; padding: 12px; border-radius: 4px; min-height: 40px; }
  </style>
</head>
<body>
  <h1>VISTA Test Data Drop Box</h1>
  <p>Paste a JSON payload and submit it to the ingestion API.</p>
  <div class="row">
    <div class="col">
      <h3>Ticket</h3>
      <textarea id="ticket">{
  "ticketId": "TK-1001",
  "serviceGroup": "SG-7",
  "cmMac": "00:11:22:33:44:55",
  "description": "Customer reports intermittent drops",
  "attributes": {"priority": "high"}
}</textarea>
      <button onclick="send('tickets','ticket')">Submit Ticket</button>
    </div>
    <div class="col">
      <h3>Stats</h3>
      <textarea id="stats">{
  "serviceGroup": "SG-7",
  "cmMac": "00:11:22:33:44:55",
  "metrics": {"rxmer": 38.2, "flapCount": 4, "t3Timeouts": 2}
}</textarea>
      <button onclick="send('stats','stats')">Submit Stats</button>
    </div>
  </div>
  <h3>Response</h3>
  <pre id="out"></pre>

  <script>
    async function send(endpoint, fieldId) {
      const out = document.getElementById('out');
      try {
        const res = await fetch('/api/' + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: document.getElementById(fieldId).value
        });
        out.textContent = JSON.stringify(await res.json(), null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
