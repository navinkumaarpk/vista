<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <title>VISTA</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100vh; overflow: hidden; }
    body { font-family: Arial, sans-serif; background: #eef1f5; color: #1a1a1a; }

    .wrap { display: flex; height: 100vh; padding: 16px; gap: 14px; }

    /* Chat fills all remaining space and shrinks when the log panel opens */
    .chat { flex: 1 1 auto; min-width: 0; height: 100%;
            background: #fff; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; overflow: hidden; }
    .chat header { background: #1F4E79; color: #fff; padding: 14px 18px;
                   display: flex; align-items: center; justify-content: space-between; }
    .chat header h1 { font-size: 17px; margin: 0; letter-spacing: 0.5px; }

  .controls { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #eee; align-items: center; }
    select { padding: 7px; border-radius: 6px; border: 1px solid #ccc; flex: 1; }
    .iconbtn { background: #eef1f5; border: 1px solid #d4d9e0; border-radius: 6px;
               padding: 7px 12px; cursor: pointer; font-size: 13px; }

    #log { flex: 1; overflow-y: auto; padding: 18px; }
    .msg { margin: 10px 0; line-height: 1.45; max-width: 80%; }
    .msg.user { margin-left: auto; text-align: right; }
    .user b { color: #1F4E79; }
    .bot span { white-space: pre-wrap; }
    .bot table { border-collapse: collapse; margin: 8px 0; }
    .bot th, .bot td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
    .bot code { background: #f2f2f2; padding: 1px 4px; border-radius: 3px; }

    .bar { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid #eee; }
    #message { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    .send { background: #1F4E79; color: #fff; border: 0; border-radius: 8px; padding: 11px 20px; cursor: pointer; }

    /* Log panel: collapsed to 0 width, animates in on demand */
    .logs { flex: none; width: 0; height: 100%; opacity: 0; overflow: hidden;
            background: #0f1722; color: #cfe3ff; border-radius: 12px;
            font-family: monospace; font-size: 12px;
            display: flex; flex-direction: column;
            transition: width 0.25s ease, opacity 0.2s ease; }
    .logs.open { width: 460px; opacity: 1; }
    .logs header { background: #16202e; padding: 12px 16px; color: #8fb8ef;
                   display: flex; justify-content: space-between; align-items: center; }
    #logbody { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .logline { margin: 2px 0; white-space: pre-wrap; word-break: break-word; }
    .logline.INFO  { color: #cfe3ff; }
    .logline.DEBUG { color: #7f9cc0; }
    .logline.WARN  { color: #f0c674; }
    .logline.ERROR { color: #ff8080; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="chat">
      <header>
        <h1>VISTA</h1>
        <a href="/monitoring.html" style="color:#cfe0f5;font-size:11px;margin-right:10px;text-decoration:none;">Triage Monitoring</a>
        <a href="/observability.html" style="color:#cfe0f5;font-size:11px;margin-right:10px;text-decoration:none;">Observability</a>
        <button class="iconbtn" id="logToggle" onclick="toggleLogs()"
                style="background:#16365c;color:#fff;border:0;">Agent Logs</button>
      </header>
      <div class="controls">
        <select id="model"></select>
        <button class="iconbtn" onclick="resetChat()">New</button>
      </div>
      <div id="log"></div>
      <div class="bar">
        <input id="message" placeholder="Ask VISTA..." onkeydown="if(event.key==='Enter')send()"/>
        <button class="send" onclick="send()">Send</button>
      </div>
    </div>

    <div class="logs" id="logs">
      <header>
        <span>Agent activity (live)</span>
        <button class="iconbtn" onclick="clearLogs()"
                style="background:#26384d;color:#cfe3ff;border:0;">clear</button>
      </header>
      <div id="logbody"></div>
    </div>
  </div>

  <script>
    let evtSource = null;

    async function loadModels() {
      const res = await fetch('/api/models');
      const models = await res.json();
      const sel = document.getElementById('model');
      sel.innerHTML = models.length
        ? models.map(m => `<option value="${m.key}">${m.label}</option>`).join('')
        : '<option>No models</option>';
    }

    function append(cls, who, text) {
      const log = document.getElementById('log');
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = `<b>${who}:</b> <span>${text}</span>`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    async function send() {
      const input = document.getElementById('message');
      const model = document.getElementById('model').value;
      const message = input.value.trim();
      if (!message) return;
      append('user', 'You', message);
      input.value = '';
      const pending = append('bot', 'VISTA', '...');
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, message })
        });
        const data = await res.json();
        pending.querySelector('span').innerHTML = DOMPurify.sanitize(marked.parse(data.reply));
      } catch (e) {
        pending.querySelector('span').textContent = 'Error: ' + e.message;
      }
    }

    async function resetChat() {
      await fetch('/api/chat/reset', { method: 'POST' });
      document.getElementById('log').innerHTML = '';
    }

    function toggleLogs() {
      const panel = document.getElementById('logs');
      const btn = document.getElementById('logToggle');
      const opening = !panel.classList.contains('open');
      panel.classList.toggle('open', opening);
      btn.textContent = opening ? 'Hide Logs' : 'Agent Logs';
      if (opening) openStream(); else closeStream();
    }

    function openStream() {
      if (evtSource) return;
      evtSource = new EventSource('/api/logs/stream');
      evtSource.onmessage = (e) => {
        const body = document.getElementById('logbody');
        const level = (e.data.split(' ')[0] || 'INFO');
        const line = document.createElement('div');
        line.className = 'logline ' + level;
        line.textContent = e.data;
        body.appendChild(line);
        body.scrollTop = body.scrollHeight;
      };
    }

    function closeStream() {
      if (evtSource) { evtSource.close(); evtSource = null; }
    }

    function clearLogs() { document.getElementById('logbody').innerHTML = ''; }

    loadModels();
  </script>
</body>
</html>
